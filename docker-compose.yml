version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: task-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasks_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: task-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  main-api:
    image: task-main-api
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJ_PATH: src/TaskManagementService.Api/TaskManagementService.Api.csproj
    container_name: task-main-api
    entrypoint: ["dotnet", "TaskManagementService.Api.dll"]
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=task_db;Username=postgres;Password=your_password
      - ExternalServices__HttpListenerUrl=http://http-listener:8080/api/tasks/events
      - ExternalServices__RabbitMqOptions__Host=rabbitmq
      - ExternalServices__RabbitMqOptions__QueueName=task-events-queue
      - ExternalServices__RabbitMqOptions__UserName=guest
      - ExternalServices__RabbitMqOptions__Password=guest
    depends_on:
      - postgres
      - rabbitmq

  http-listener:
    image: task-http-listener
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJ_PATH: src/TaskManagementService.Listener.Http.Api/TaskManagementService.Listener.Http.Api.csproj
    container_name: task-http-listener
    entrypoint: ["dotnet", "TaskManagementService.Listener.Http.Api.dll"]
    ports:
      - "5002:8080"
    depends_on:
      - rabbitmq

  rabbit-listener:
    image: task-rabbit-listener
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJ_PATH: src/TaskManagementService.Listener.Rabbit.Api/TaskManagementService.Listener.Rabbit.Api.csproj
    container_name: task-rabbit-listener
    entrypoint: ["dotnet", "TaskManagementService.Listener.Rabbit.Api.dll"]
    environment:
      - RabbitMqOptions__Host=rabbitmq
      - RabbitMqOptions__QueueName=task-events-queue
      - RabbitMqOptions__UserName=guest
      - RabbitMqOptions__Password=guest
    depends_on:
      - rabbitmq

volumes:
  pgdata:
